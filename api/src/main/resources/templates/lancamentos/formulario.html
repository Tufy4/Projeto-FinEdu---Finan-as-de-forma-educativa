<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Lançamento - FinEdu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0 h5">Cadastrar Lançamento</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/lancamentos/salvar}" th:object="${lancamento}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" th:field="*{descricao}" class="form-control" placeholder="Ex: SALÁRIO, ALUGUEL, MERCADO">
                        <div class="text-danger small" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" th:field="*{dataLancamento}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('dataLancamento')}" th:errors="*{dataLancamento}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Lançamento</label>
                        <select th:field="*{tipo}" class="form-select">
                            <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <input type="text" th:field="*{categoria}" class="form-control" placeholder="Ex: LAZER, MORADIA, EDUCAÇÃO">
                        <div class="text-danger small" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/lancamentos}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Salvar Lançamento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
