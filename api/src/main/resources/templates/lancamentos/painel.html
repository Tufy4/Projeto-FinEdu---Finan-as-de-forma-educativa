<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinEdu - Painel Financeiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary">Meus Lançamentos</h1>
            <a th:href="@{/lancamentos/novo}" class="btn btn-success">Novo Lançamento</a>
        </div>

        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="l : ${lancamentos}">
                    <td th:text="${#temporals.format(l.dataLancamento, 'dd/MM/yyyy')}"></td>
                    <td th:text="${l.descricao}"></td>
                    <td th:text="${l.categoria}"></td>
                    <td>
                        <span th:text="${l.tipo}" 
                              th:class="${l.tipo.name() == 'ENTRADA' ? 'badge bg-info' : 'badge bg-danger'}">
                        </span>
                    </td>
                    <td th:text="'R$ ' + ${l.valor}" class="fw-bold"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
