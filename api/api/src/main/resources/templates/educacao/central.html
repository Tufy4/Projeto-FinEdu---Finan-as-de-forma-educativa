<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container mt-4">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark">Central de <span class="text-success">Conhecimento</span></h1>
            <p class="text-muted">Domine os conceitos que movem o seu patrimônio.</p>
        </div>

        <div class="row g-4">
            <div th:each="artigo : ${artigos}" class="col-md-4">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden border-top border-success border-5">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-light rounded-circle p-3 me-3 text-success fs-3">
                                <i th:class="'bi ' + ${artigo.icone}"></i>
                            </div>
                            <h5 class="fw-bold m-0" th:text="${artigo.titulo}"></h5>
                        </div>
                        
                        <p class="text-secondary mb-4" th:text="${artigo.resumo}"></p>
                        
                        <div class="p-3 bg-light rounded-3 mb-3">
                            <small class="fw-bold text-uppercase d-block mb-1 text-muted">Como funciona:</small>
                            <span class="small" th:text="${artigo.detalheTecnico}"></span>
                        </div>

                        <div class="p-3 border border-success-subtle rounded-3">
                            <small class="fw-bold text-uppercase d-block mb-1 text-success">Impacto no bolso:</small>
                            <span class="small fst-italic" th:text="${artigo.impactoFinanceiro}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5 p-4 bg-dark text-white rounded-4 shadow d-flex align-items-center justify-content-between border-start border-success border-5">
            <div>
                <h5 class="fw-bold m-0">Ainda com dúvidas?</h5>
                <p class="small text-secondary mb-0">Utilize o nosso simulador para ver esses dados na prática.</p>
            </div>
            <a href="/investimentos" class="btn btn-finedu fw-bold px-4">Ir para Simulador</a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
