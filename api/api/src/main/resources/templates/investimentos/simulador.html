<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
	<div th:replace="~{fragments/layout :: header}"></div>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold m-0">
				<i class="bi bi-rocket-takeoff text-success"></i> Inteligência de
				Investimentos
			</h2>
			<span class="badge bg-dark text-success p-2">CÁLCULOS EM TEMPO
				REAL</span>
		</div>

		<div class="row g-4">
			<div class="col-lg-4">
				<div
					class="card border-0 shadow-sm p-4 bg-dark text-white rounded-4 h-100">
					<h5 class="text-success mb-4 fw-bold">Parâmetros</h5>
					<form th:action="@{/investimentos/simular}" method="post">
						<div class="mb-3">
							<label class="form-label small fw-bold text-secondary">VALOR
								DO APORTE (R$)</label>
							<div class="input-group">
								<span class="input-group-text bg-secondary border-0 text-white">R$</span>
								<input type="number" name="aporte"
									class="form-control bg-dark text-white border-secondary"
									th:value="${aporte ?: 1000}" required>
							</div>
						</div>
						<div class="mb-3">
							<label class="form-label small fw-bold text-secondary">PERÍODO
								DE TEMPO</label> <select name="meses"
								class="form-select bg-dark text-white border-secondary">
								<option value="1" th:selected="${meses == 1}">1 Mês</option>
								<option value="12" th:selected="${meses == 12}">1 Ano</option>
								<option value="60" th:selected="${meses == 60}">5 Anos</option>
								<option value="120" th:selected="${meses == 120}">10
									Anos</option>
							</select>
						</div>
						<div class="mb-4">
							<label class="form-label small fw-bold text-secondary">ESCOLHER
								ATIVO</label> 
								<select name="ativo"
								class="form-select bg-dark text-white border-secondary">
								<option value="SELIC"
									th:selected="${ativoSelecionado == 'SELIC'}"
									th:text="'Tesouro Selic (' + ${#numbers.formatDecimal(selicReal ?: 10.75, 1, 2)} + '%)'">
								</option>
								<option value="CDB" th:selected="${ativoSelecionado == 'CDB'}"
									th:text="'CDB 100% CDI (' + ${#numbers.formatDecimal((selicReal ?: 10.75) - 0.1, 1, 2)} + '%)'">
								</option>
							</select>
						</div>
						<button type="submit"
							class="btn btn-finedu w-100 fw-bold py-3 shadow">SIMULAR
							AGORA</button>
					</form>
				</div>
			</div>

			<div class="col-lg-8">
				<div class="card border-0 shadow-sm p-4 rounded-4 h-100 bg-white">
					<div th:if="${resultado}">
						<div class="row mb-3 align-items-center">
							<div class="col-md-7">
								<h6 class="text-muted small text-uppercase fw-bold mb-1">
									Total Estimado (<span th:text="${meses}"></span> meses)
								</h6>
								<h2 class="fw-bold text-dark display-6 mb-0"
									th:text="'R$ ' + ${resultado.valorFinal}"></h2>
								<p class="text-success small fw-bold mt-1">
									<i class="bi bi-graph-up-arrow"></i> Lucro de R$ <span
										th:text="${resultado.rendimentoTotal}"></span>
								</p>
							</div>
							<div class="col-md-5 text-md-end">
								<div class="p-2 bg-light rounded border border-warning-subtle">
									<span class="text-warning fw-bold small"><i
										class="bi bi-exclamation-triangle"></i> Valores Brutos (Sem
										IR)</span>
								</div>
							</div>
						</div>

						<div style="position: relative; height: 320px;">
							<canvas id="chartEvolucao"></canvas>
						</div>
					</div>

					<div th:unless="${resultado}" class="text-center py-5 my-auto">
						<i class="bi bi-bar-chart-line text-light display-1"></i>
						<h4 class="text-muted mt-4">Preencha os dados para gerar a
							projeção comparativa.</h4>
					</div>
				</div>
			</div>

			<div class="col-12 mt-2">
				<div
					class="card border-0 shadow-sm p-4 rounded-4 bg-white border-top border-success border-5">
					<div class="row align-items-center">
						<div class="col-md-4">
							<h4 class="fw-bold m-0">
								<i class="bi bi-currency-exchange text-success"></i> Conversão
								Direta
							</h4>
							<p class="text-muted small m-0">Simule a troca de moeda com
								taxas de mercado.</p>
						</div>
						<div class="col-md-4 mt-3 mt-md-0">
							<div class="input-group input-group-lg shadow-sm">
								<span class="input-group-text bg-white border-end-0">R$</span> <input
									type="number" id="valorBRL"
									class="form-control border-start-0 ps-1"
									placeholder="Digite o valor..." oninput="converterMoedas()">
							</div>
						</div>
						<div class="col-md-4 mt-3 mt-md-0">
							<div
								class="d-flex justify-content-around bg-light p-3 rounded-4 border shadow-sm">
								<div class="text-center">
									<span class="small text-muted d-block fw-bold">DÓLAR
										(USD)</span>
									<h4 id="resUSD" class="fw-bold mb-0 text-dark">$ 0.00</h4>
								</div>
								<div class="vr mx-2"></div>
								<div class="text-center">
									<span class="small text-muted d-block fw-bold">EURO
										(EUR)</span>
									<h4 id="resEUR" class="fw-bold mb-0 text-dark">€ 0.00</h4>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{fragments/layout :: footer}"></div>

	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        window.taxaUSDReal = [[${taxaUSD ?: 5.00}]];
        window.taxaEURReal = [[${taxaEUR ?: 5.40}]];

        /*[# th:if="${resultado}"]*/
        const dataAtivo = /*[[${resultado.evolucaoMensal}]]*/ {};
        const dataPoupanca = /*[[${comparativo.evolucaoMensal}]]*/ {};
        /*[/]*/
    </script>

    <script th:src="@{/js/investimento.js}"></script>

    <script th:if="${resultado}">
        inicializarGrafico(dataAtivo, dataPoupanca);
    </script>
</body>
</html>
