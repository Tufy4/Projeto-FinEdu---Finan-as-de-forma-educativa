<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --finedu-green: #28a745; --finedu-dark-green: #1e7e34; }
        body { background-color: #f8f9fa; color: #212529; }
        .navbar { background-color: #000000; border-bottom: 3px solid var(--finedu-green); }
        .btn-finedu { background-color: var(--finedu-green); color: white; border: none; }
        .btn-finedu:hover { background-color: var(--finedu-dark-green); color: white; }
        .logo-text { color: var(--finedu-green); font-weight: bold; font-size: 1.5rem; }
        footer { background-color: #000000; color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>

    <nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/lancamentos">
                <span class="logo-text"><i class="bi bi-graph-up-arrow"></i> FinEdu</span>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/lancamentos">Painel</a>
                <a class="nav-link" href="/lancamentos/novo">Novo Lançamento</a>
                <a class="nav-link" href="/investimentos">Investimentos</a>
                <a class="nav-link" href="/educacao">Educativo</a>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 FinEdu Tech - Educação Financeira</p>
            <small class="text-secondary">Desenvolvido com Java 21 & Spring Boot</small>
        </div>
    </footer>

</body>
</html>S
